version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-creditpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-creditpulse_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-creditpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-creditpulse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-creditpulse}:${POSTGRES_PASSWORD:-creditpulse_dev_only}@postgres:5432/${POSTGRES_DB:-creditpulse}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-creditpulse}:${POSTGRES_PASSWORD:-creditpulse_dev_only}@postgres:5432/${POSTGRES_DB:-creditpulse}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./creditpulse:/app/creditpulse
    command: >
      sh -c "alembic upgrade head &&
             python -m creditpulse.db.seed &&
             uvicorn creditpulse.api.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-creditpulse}:${POSTGRES_PASSWORD:-creditpulse_dev_only}@postgres:5432/${POSTGRES_DB:-creditpulse}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./creditpulse:/app/creditpulse
    command: python -m creditpulse.workers.enrichment_worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
